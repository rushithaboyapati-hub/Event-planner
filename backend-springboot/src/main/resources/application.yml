server:
  port: ${PORT:${SPRINGBOOT_PORT:8090}}

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:eventplanner}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd'T'HH:mm:ss
  sql:
    init:
      mode: always

jwt:
  secret: ${JWT_SECRET:EventPlannerSecretKeyForJWTTokenGeneration2026VeryLongAndSecure}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
